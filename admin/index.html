<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CueCadence Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #141920;
    --card: #1c2333;
    --card-hover: #212840;
    --border: #2d3650;
    --border-light: #252e45;
    --text: #E8EBF4;
    --text-muted: #8892b0;
    --text-dim: #4e5a7a;
    --accent: #90CDF4;
    --accent-dim: #162438;
    --navy: #1A3A6E;
    --navy-mid: #2A4A8F;
    --green: #5DCAA5;
    --green-dim: #0d2e22;
    --green-text: #04342C;
    --yellow: #d4a84b;
    --yellow-dim: #2e2008;
    --red: #e05c5c;
    --red-dim: #321414;
    --purple: #9b8aff;
    --purple-dim: #201d4a;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    margin: 0;
  }
  .mono { font-family: 'DM Mono', monospace; }
  .serif { font-family: 'DM Serif Display', serif; }
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 220px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 100;
  }
  .main { margin-left: 220px; padding: 32px; min-height: 100vh; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px; border-radius: 6px; margin: 2px 8px;
    cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text-muted); transition: all .15s;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--card-hover); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(88,166,255,.2); }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    transition: border-color .15s;
  }
  .stat-card:hover { border-color: var(--border-light); }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace;
    letter-spacing: .02em; white-space: nowrap;
  }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-blue { background: var(--accent-dim); color: var(--accent); }
  .badge-yellow { background: var(--yellow-dim); color: var(--yellow); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-purple { background: var(--purple-dim); color: var(--purple); }
  .badge-gray { background: #21262D; color: var(--text-muted); }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 10px 14px; text-align: left;
    font-size: 11px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }
  tbody tr {
    border-bottom: 1px solid var(--border-light);
    transition: background .1s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--card-hover); }
  tbody td { padding: 11px 14px; font-size: 13px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 6px;
    font-size: 13px; font-weight: 600; font-family: 'Outfit', sans-serif;
    cursor: pointer; border: 1px solid; transition: all .15s;
  }
  .btn-primary { background: var(--green); color: var(--green-text); border-color: var(--green); }
  .btn-primary:hover { opacity: .88; }
  .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
  .btn-outline:hover { background: var(--card-hover); border-color: #484F58; }
  .btn-danger { background: var(--red-dim); color: var(--red); border-color: rgba(248,81,73,.3); }
  .btn-danger:hover { background: rgba(248,81,73,.2); }
  .btn-disabled { background: var(--card-hover); color: var(--text-dim); border-color: var(--border); cursor: not-allowed; }
  .input {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 7px 12px;
    font-size: 13px; font-family: 'Outfit', sans-serif;
    transition: border-color .15s; outline: none;
  }
  .input:focus { border-color: var(--accent); }
  .step-done { color: var(--green); }
  .step-current { color: var(--accent); }
  .step-pending { color: var(--text-dim); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 0; }
  .funnel-bar {
    height: 10px; border-radius: 5px;
    background: var(--accent); transition: width .4s;
  }
  .section-label {
    font-size: 9px; font-weight: 400; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    padding: 12px 16px 4px;
  }
  .view { display: none; }
  .view.active { display: block; }
  .timeline-item { display: flex; gap: 14px; padding: 10px 0; }
  .timeline-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); flex-shrink: 0; margin-top: 5px;
  }
  .device-slot {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }
  th.sort-asc::after { content: ' ↑'; color: var(--accent); }
  th.sort-desc::after { content: ' ↓'; color: var(--accent); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .json-toggle { cursor: pointer; color: var(--text-muted); font-size: 11px; font-family: 'DM Mono', monospace; }
  .json-toggle:hover { color: var(--accent); }
  .json-body { display: none; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; margin-top: 6px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted); white-space: pre; overflow-x: auto; }
  .json-body.open { display: block; }
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--card); border: 1px solid var(--border);
    padding: 10px 18px; border-radius: 8px; font-size: 13px;
    opacity: 0; transform: translateY(8px);
    transition: all .2s; pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  .filter-pill {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-family: 'DM Mono', monospace;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--bg); color: var(--text-muted);
    transition: all .12s; user-select: none;
  }
  .filter-pill:hover { border-color: #484F58; color: var(--text); }
  .filter-pill.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(144,205,244,.25); }
  .filter-pill.active.green { background: var(--green-dim); color: var(--green); border-color: rgba(93,202,165,.25); }
  .filter-pill.active.yellow { background: var(--yellow-dim); color: var(--yellow); border-color: rgba(212,168,75,.25); }
  .filter-pill.active.red { background: var(--red-dim); color: var(--red); border-color: rgba(224,92,92,.25); }
  .filter-pill.active.purple { background: var(--purple-dim); color: var(--purple); border-color: rgba(155,138,255,.25); }
  .filter-pill.active.gray { background: #1c2230; color: var(--text-muted); border-color: #30363d; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div style="padding:18px 16px 14px; border-bottom:1px solid var(--border);">
    <svg width="130" height="28" viewBox="0 0 130 28" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="26" height="26" rx="7" fill="#2A4A8F"/>
      <rect x="5" y="9" width="4" height="10" rx="2" fill="white" opacity="0.4"/>
      <rect x="11" y="6" width="4" height="16" rx="2" fill="white"/>
      <rect x="17" y="11" width="4" height="8" rx="2" fill="#90CDF4" opacity="0.8"/>
      <rect x="23" y="8" width="4" height="13" rx="2" fill="white" opacity="0.85"/>
      <text x="34" y="19" font-size="14" font-weight="600" fill="#FFFFFF" font-family="Outfit, sans-serif">Cue<tspan font-weight="300" fill="#90CDF4">Cadence</tspan></text>
    </svg>
    <div style="font-size:9px;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-top:6px;padding-left:1px;">Admin Console</div>
  </div>

  <div style="flex:1;overflow-y:auto;padding:8px 0;">
    <div class="section-label">Keys</div>
    <div class="nav-item active" onclick="navigate('users')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Users
    </div>
    <div class="section-label">Analytics</div>
    <div class="nav-item" onclick="navigate('dashboard')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </div>
    <div class="nav-item" onclick="navigate('stats')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Stats
    </div>
  </div>

</aside>

<!-- Main -->
<main class="main">

  <!-- ───────── DASHBOARD ───────── -->
  <div id="view-dashboard" class="view">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
      <div>
        <h1 style="font-size:22px;font-family:'DM Serif Display',serif;font-weight:400;margin:0;">Dashboard</h1>
        <p style="font-size:13px;color:var(--text-muted);margin:4px 0 0;">Live overview of license activity</p>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="last-refreshed" style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;"></span>
        <button class="btn btn-outline" onclick="refreshDashboard()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
      </div>
    </div>

    <div id="stat-cards" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;"></div>

    <div class="card">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div style="font-size:14px;font-weight:600;">Recent Activity</div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span id="activity-count" style="font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;"></span>
            <button onclick="clearActivityFilters()" id="activity-clear" style="display:none;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:0;">✕ clear</button>
            <button onclick="toggleActivityFilters()" id="filter-toggle-btn" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-muted);background:none;border:1px solid var(--border);border-radius:5px;cursor:pointer;padding:4px 9px;transition:all .15s;">
              <svg id="filter-toggle-icon" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
              Filters
            </button>
          </div>
        </div>
        <div id="activity-filter-panel" style="display:none;margin-top:14px;">
          <div style="margin-bottom:8px;">
            <div style="font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;">Event</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;" id="filter-event"></div>
          </div>
          <div style="margin-bottom:8px;">
            <div style="font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;">Tier</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;" id="filter-tier"></div>
          </div>
          <div>
            <div style="font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;">Status</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;" id="filter-status"></div>
          </div>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table id="activity-table">
          <thead>
            <tr><th>Event</th><th>Name</th><th>Company</th><th>Tier</th><th>Key</th><th>Time</th></tr>
          </thead>

  </div>

  <!-- ───────── USERS ───────── -->

        Generate Keys
      </button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px;">
      <input class="input" id="user-search" placeholder="Search name, company, email, key…" style="width:300px;" oninput="renderUsersTable()">
      <select class="input" id="user-status-filter" onchange="renderUsersTable()">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="pending_verification">Pending</option>
        <option value="expired">Expired</option>
        <option value="revoked">Revoked</option>
      </select>
      <select class="input" id="user-tier-filter" onchange="renderUsersTable()">
        <option value="">All tiers</option>
        <option value="trial">Trial</option>
        <option value="basic">Basic</option>
        <option value="standard">Standard</option>
        <option value="pro">Pro</option>
      </select>
      <button id="user-reset-filters" class="btn btn-disabled" onclick="resetUserFilters()" disabled>✕ Reset Filters</button>
      <span id="user-count" style="margin-left:auto;font-size:12px;color:var(--text-muted);align-self:center;"></span>
    </div>
    <div class="card" style="overflow:hidden;">
      <div style="overflow-x:auto;">
        <table id="users-table">
          <thead>
            <tr>
              <th class="sortable" onclick="sortUsers('name')">Name</th>
              <th class="sortable" onclick="sortUsers('company')">Company</th>
              <th>Key</th>
              <th class="sortable" onclick="sortUsers('status')">Status</th>
              <th class="sortable" onclick="sortUsers('tier')">Tier</th>
              <th class="sortable" onclick="sortUsers('expires_at')">Expires</th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ───────── USER DETAIL ───────── -->
  <div id="view-detail" class="view">
    <div style="margin-bottom:24px;">
      <button class="btn btn-outline" onclick="navigate('users')" style="margin-bottom:16px;">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Users

  </div>

  <!-- ───────── STATS ───────── -->
  <div id="view-stats" class="view">

  </div>

</main>

<!-- Toast -->
<div id="toast"></div>

<script>
const API = 'https://api.cuecadence.io';

// ─────────────────────────────────────────
// API FETCH
// ─────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function fmtTime(unix) {
  if (!unix) return '—';
  const d = new Date(unix * 1000);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  if (diff < 7*86400000) return Math.floor(diff/86400000) + 'd ago';
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function fmtDate(unix) {
  if (!unix) return '—';
  return new Date(unix * 1000).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function fmtDatetimeLocal(unix) {
  if (!unix) return '';
  const d = new Date(unix * 1000);
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0,16);
}

const NOW = Math.floor(Date.now() / 1000);
const DAY = 86400;

function timeRemaining(expires_at, status) {
  if (status === 'revoked') return 'Revoked';
  if (status === 'expired' || expires_at < NOW) return 'Expired';
  const days = Math.ceil((expires_at - NOW) / DAY);
  if (days === 1) return '1 day remaining';
  return days + ' days remaining';
}

function statusBadge(s) {
  const map = { active:'badge-green', pending_verification:'badge-yellow', expired:'badge-gray', revoked:'badge-red' };
  const labels = { active:'● Active', pending_verification:'◌ Pending', expired:'○ Expired', revoked:'✕ Revoked' };
  return `<span class="badge ${map[s]||'badge-gray'}">${labels[s]||s}</span>`;
}

function tierBadge(t) {
  const map = { trial:'badge-blue', basic:'badge-gray', standard:'badge-purple', pro:'badge-yellow' };
  return `<span class="badge ${map[t]||'badge-gray'}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`;
}

function eventBadge(e) {
  const map = {
    key_requested:'badge-gray', email_verified:'badge-blue', app_activated:'badge-green',
    app_validated:'badge-green', expiry_changed:'badge-yellow', tier_changed:'badge-purple',
    key_revoked:'badge-red', device_reset:'badge-yellow', validation_failed:'badge-red',
  };
  const label = e.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
  return `<span class="badge ${map[e]||'badge-gray'}">${label}</span>`;
}

function platformIcon(p) {
  if (p === 'windows') return '<span style="font-size:11px;color:var(--text-muted)">⊞ win</span>';
  if (p === 'mac') return '<span style="font-size:11px;color:var(--text-muted)">⌘ mac</span>';
  return '<span style="color:var(--text-dim)">—</span>';
}

function shortKey(hash) {
  return `<span class="mono" style="font-size:11px;color:var(--text-muted)">${hash.slice(0,8)}…</span>`;
}

function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = (ok ? '✓ ' : '✗ ') + msg;
  el.style.borderColor = ok ? 'var(--green)' : 'var(--red)';
  el.style.color = ok ? 'var(--green)' : 'var(--red)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function navigate(view, keyHash) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + (view === 'detail' ? 'detail' : view)).classList.add('active');
  if (view !== 'detail') {
    document.querySelector(`[onclick="navigate('${view}')"]`).classList.add('active');
  }
  if (view === 'dashboard') renderDashboard();
  if (view === 'users') renderUsers();
  if (view === 'detail' && keyHash) renderDetail(keyHash);
  if (view === 'stats') renderStats();
}

// ─────────────────────────────────────────
// DASHBOARD VIEW
// ─────────────────────────────────────────
let allActivityEvents = [];
const activityFilters = { event: new Set(), tier: new Set(), status: new Set() };

const EVENT_TYPES = [
  { value: 'key_requested',     label: 'Key Requested',     color: 'gray'   },
  { value: 'email_verified',    label: 'Email Verified',    color: ''       },
  { value: 'app_activated',     label: 'App Activated',     color: 'green'  },
  { value: 'app_validated',     label: 'App Validated',     color: 'green'  },
  { value: 'expiry_changed',    label: 'Expiry Changed',    color: 'yellow' },
  { value: 'tier_changed',      label: 'Tier Changed',      color: 'purple' },
  { value: 'key_revoked',       label: 'Key Revoked',       color: 'red'    },
  { value: 'device_reset',      label: 'Device Reset',      color: 'yellow' },
  { value: 'validation_failed', label: 'Validation Failed', color: 'red'    },
];
const TIER_TYPES = [
  { value: 'trial',    label: 'Trial',    color: ''       },
  { value: 'basic',    label: 'Basic',    color: 'gray'   },
  { value: 'standard', label: 'Standard', color: 'purple' },
  { value: 'pro',      label: 'Pro',      color: 'yellow' },
];
const STATUS_TYPES = [
  { value: 'active',               label: 'Active',  color: 'green'  },
  { value: 'pending_verification', label: 'Pending', color: 'yellow' },
  { value: 'expired',              label: 'Expired', color: 'gray'   },
  { value: 'revoked',              label: 'Revoked', color: 'red'    },
];

async function renderDashboard() {
  try {
    const data = await apiFetch('/admin/stats');
    renderStatCards(data);
    allActivityEvents = data.recent_events || [];
    renderActivityPills();
    applyActivityFilters();
    const el = document.getElementById('last-refreshed');
    if (el) el.textContent = 'Refreshed ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch (err) {
    document.getElementById('stat-cards').innerHTML =
      `<div style="grid-column:1/-1;color:var(--red);font-size:13px;">Failed to load: ${err.message}</div>`;
  }
}

function refreshDashboard() { renderDashboard().then(() => toast('Refreshed')); }

let filtersVisible = false;

function toggleActivityFilters() {
  filtersVisible = !filtersVisible;
  const panel = document.getElementById('activity-filter-panel');
  const btn   = document.getElementById('filter-toggle-btn');
  panel.style.display = filtersVisible ? 'block' : 'none';
  btn.style.color       = filtersVisible ? 'var(--accent)' : 'var(--text-muted)';
  btn.style.borderColor = filtersVisible ? 'rgba(144,205,244,.3)' : 'var(--border)';
  btn.style.background  = filtersVisible ? 'var(--accent-dim)' : 'none';
}

function renderActivityPills() {
  function makePills(containerId, items, filterSet) {
    const presentValues = new Set(
      items.map(i => i.value).filter(v =>
        allActivityEvents.some(e =>
          containerId === 'filter-event' ? e.event === v
          : containerId === 'filter-tier' ? e.tier === v
          : e.status === v
        )
      )
    );
    document.getElementById(containerId).innerHTML = items
      .filter(i => presentValues.has(i.value))
      .map(i => {
        const on = filterSet.has(i.value);
        return `<span class="filter-pill ${on ? 'active ' + i.color : ''}"
          onclick="toggleActivityFilter('${containerId}','${i.value}','${i.color}')"
        >${i.label}</span>`;
      }).join('');
  }
  makePills('filter-event',  EVENT_TYPES,  activityFilters.event);
  makePills('filter-tier',   TIER_TYPES,   activityFilters.tier);
  makePills('filter-status', STATUS_TYPES, activityFilters.status);
}

function toggleActivityFilter(containerId, value, color) {
  const map = {
    'filter-event':  activityFilters.event,
    'filter-tier':   activityFilters.tier,
    'filter-status': activityFilters.status,
  };
  const set = map[containerId];
  set.has(value) ? set.delete(value) : set.add(value);
  renderActivityPills();
  applyActivityFilters();
}

function clearActivityFilters() {
  activityFilters.event.clear();
  activityFilters.tier.clear();
  activityFilters.status.clear();
  renderActivityPills();
  applyActivityFilters();
}

function applyActivityFilters() {
  const { event, tier, status } = activityFilters;
  const filtered = allActivityEvents.filter(e =>
    (event.size  === 0 || event.has(e.event))  &&
    (tier.size   === 0 || tier.has(e.tier))    &&
    (status.size === 0 || status.has(e.status))
  );
  const total = activityFilters.event.size + activityFilters.tier.size + activityFilters.status.size;
  const countEl = document.getElementById('activity-count');
  const clearEl = document.getElementById('activity-clear');
  const btn     = document.getElementById('filter-toggle-btn');
  if (total > 0) {
    countEl.textContent = `${filtered.length} of ${allActivityEvents.length}`;
    clearEl.style.display = 'inline';
    if (btn) { btn.style.color = 'var(--accent)'; btn.style.borderColor = 'rgba(144,205,244,.3)'; btn.style.background = 'var(--accent-dim)'; }
  } else {
    countEl.textContent = `${allActivityEvents.length} events`;
    clearEl.style.display = 'none';
    if (btn && !filtersVisible) { btn.style.color = 'var(--text-muted)'; btn.style.borderColor = 'var(--border)'; btn.style.background = 'none'; }
  }
  renderActivityTable(filtered);
}

function navigateToUsersFiltered(status, tier) {
  document.getElementById('user-status-filter').value = status || '';
  document.getElementById('user-tier-filter').value   = tier   || '';
  navigate('users');
}

function renderStatCards(data) {
  const cards = [
    { label: 'Total Keys',    value: data.total_keys,   sub: `+${data.new_last_7_days} this week`, icon: '⊕', color: 'var(--accent)',  onclick: null },
    { label: 'Active Trials', value: data.active_trials, sub: 'currently running',                  icon: '◎', color: 'var(--green)',   onclick: "navigateToUsersFiltered('active','trial')" },
    { label: 'Expiring (7d)', value: data.expiring_7d,  sub: 'need attention',                      icon: '◷', color: 'var(--yellow)',  onclick: "navigateToUsersFiltered('active','')" },
    { label: 'Paid Keys',     value: data.paid_keys,    sub: 'converted from trial',                icon: '★', color: 'var(--purple)', onclick: null },
  ];
  document.getElementById('stat-cards').innerHTML = cards.map(c => `
    <div class="stat-card" ${c.onclick ? `onclick="${c.onclick}" style="cursor:pointer"` : ''}>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;">
        <div style="font-size:10px;font-weight:400;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted);font-family:'DM Mono',monospace">${c.label}</div>
        <div style="font-size:16px;color:${c.color};opacity:.6">${c.icon}</div>
      </div>
      <div style="font-size:40px;font-family:'DM Serif Display',serif;font-weight:400;line-height:1.1;margin:8px 0 4px;color:${c.color}">${c.value}</div>
      <div style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace">${c.sub}</div>
    </div>
  `).join('');
}

function renderActivityTable(events) {
  const tbody = document.getElementById('activity-body');
  if (!events || !events.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:32px">No recent activity</td></tr>';
    return;
  }
  tbody.innerHTML = events.map(e => {
    const name = [e.first_name, e.last_name].filter(Boolean).join(' ') || '—';
    const meta = typeof e.metadata === 'string' ? (() => { try { return JSON.parse(e.metadata); } catch { return null; } })() : e.metadata;
    const isDupe = e.event === 'key_requested' && meta?.duplicate;
    const rowStyle = isDupe ? 'background:rgba(212,168,75,.04);' : '';
    const platSuffix = e.platform === 'windows'
      ? ' <span style="font-size:10px;color:var(--text-dim)" title="Windows">⊞</span>'
      : e.platform === 'mac'
      ? ' <span style="font-size:10px;color:var(--text-dim)" title="Mac">⌘</span>'
      : '';
    const eventCell = (isDupe
      ? `${eventBadge(e.event)} <span title="Duplicate request" style="font-size:11px;color:var(--yellow);">⚠</span>`
      : eventBadge(e.event)) + platSuffix;
    const keyDisplay = e.key
      ? `<span class="mono" style="font-size:11px;color:var(--text-muted)">${e.key}</span>`
      : shortKey(e.key_hash);
    return `<tr onclick="navigate('detail','${e.key_hash}')" style="${rowStyle}">
      <td>${eventCell}</td>
      <td style="font-weight:500">${name}</td>
      <td style="color:var(--text-muted)">${e.company||'—'}</td>
      <td>${e.tier ? tierBadge(e.tier) : '—'}</td>
      <td>${keyDisplay}</td>
      <td style="color:var(--text-muted);font-size:12px">${fmtTime(e.created_at)}</td>
    </tr>`;
  }).join('');
}

// USERS VIEW
// ─────────────────────────────────────────
let usersData = [];
let sortCol = 'name';
let sortDir = 1;

async function renderUsers() {
  try {
    const data = await apiFetch('/admin/keys');
    usersData = data.keys;
    renderUsersTable();
  } catch (err) {
    document.getElementById('users-body').innerHTML =
      `<tr><td colspan="6" style="text-align:center;color:var(--red);padding:32px">${err.message}</td></tr>`;
  }
}

function sortUsers(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('#users-table th').forEach(th => th.classList.remove('sort-asc', 'sort-desc'));
  const cols = ['name','company',null,'status','tier','expires_at'];
  const idx = cols.indexOf(col);
  if (idx >= 0) {
    const ths = document.querySelectorAll('#users-table th');
    ths[idx].classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  }
  renderUsersTable();
}

function resetUserFilters() {
  document.getElementById('user-search').value = '';
  document.getElementById('user-status-filter').value = '';
  document.getElementById('user-tier-filter').value = '';
  renderUsersTable();
}

function renderUsersTable() {
  const search = (document.getElementById('user-search').value || '').toLowerCase();
  const sf = document.getElementById('user-status-filter').value;
  const tf = document.getElementById('user-tier-filter').value;

  const resetBtn = document.getElementById('user-reset-filters');
  if (resetBtn) {
    const active = !!(search || sf || tf);
    resetBtn.disabled = !active;
    resetBtn.className = active ? 'btn btn-outline' : 'btn btn-disabled';
  }

  let rows = usersData.filter(k => {
    const name = [k.first_name, k.last_name].filter(Boolean).join(' ').toLowerCase();
    const match = !search || name.includes(search) || (k.company||'').toLowerCase().includes(search) || k.key.toLowerCase().includes(search) || (k.email||'').toLowerCase().includes(search);
    return match && (!sf || k.status === sf) && (!tf || k.tier === tf);
  });

  rows.sort((a, b) => {
    let av, bv;
    if (sortCol === 'name') { av = [a.first_name,a.last_name].join(' '); bv = [b.first_name,b.last_name].join(' '); }
    else if (sortCol === 'company') { av = a.company||''; bv = b.company||''; }
    else if (sortCol === 'status') { av = a.status; bv = b.status; }
    else if (sortCol === 'tier') { av = a.tier; bv = b.tier; }
    else if (sortCol === 'expires_at') { av = a.expires_at||0; bv = b.expires_at||0; }
    else { av = ''; bv = ''; }
    if (typeof av === 'number') return (av - bv) * sortDir;
    return av.localeCompare(bv) * sortDir;
  });

  document.getElementById('user-count').textContent = `${rows.length} of ${usersData.length}`;

  const tbody = document.getElementById('users-body');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:32px">No results</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(k => {
    const name = [k.first_name, k.last_name].filter(Boolean).join(' ') || '—';
    const expClass = k.expires_at < NOW + 7*DAY && k.status === 'active' ? 'color:var(--yellow)' : 'color:var(--text-muted)';
    return `<tr onclick="navigate('detail','${k.key_hash}')">
      <td>
        <div style="font-weight:600;font-size:13px">${name}</div>
        <div style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace">${k.email||''}</div>
      </td>
      <td style="color:var(--text-muted)">${k.company||'—'}</td>
      <td><span class="mono" style="font-size:12px;color:var(--text-muted)">${k.key}</span></td>
      <td>${statusBadge(k.status)}</td>
      <td>${tierBadge(k.tier)}</td>
      <td style="${expClass};font-size:12px">${fmtDate(k.expires_at)}</td>
    </tr>`;
  }).join('');
}

let detailKeyHash = null;

async function renderDetail(keyHash) {
  detailKeyHash = keyHash;
  const container = document.getElementById('detail-content');
  container.innerHTML = '<div style="color:var(--text-muted);font-size:13px">Loading…</div>';
  try {
    const data = await apiFetch('/admin/keys/' + keyHash);
    const { key: k, events } = data;

    const steps = [
      { label: 'Requested', ts: k.requested_at },
      { label: 'Verified',  ts: k.verified_at  },
      { label: 'Activated', ts: k.activated_at },
      { label: 'Validated', ts: k.last_validated_at },
    ];
    let currentStep = 0;
    steps.forEach((s, i) => { if (s.ts) currentStep = i + 1; });

    const stepperHtml = `<div style="display:flex;align-items:flex-start;position:relative;">
      ${steps.map((s, i) => {
        const done = i < currentStep;
        const current = i === currentStep;
        const lineColor = done ? 'var(--green)' : 'var(--border)';
        return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;position:relative;">
          ${i < steps.length-1 ? `<div style="position:absolute;top:14px;left:50%;width:100%;height:2px;background:${lineColor};z-index:0;"></div>` : ''}
          <div style="width:28px;height:28px;border-radius:50%;border:2px solid ${done?'var(--green)':current?'var(--accent)':'var(--border)'};background:${done?'var(--green-dim)':current?'var(--accent-dim)':'var(--bg)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;">
            ${done ? '<svg width="12" height="12" fill="none" stroke="var(--green)" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' : `<div style="width:6px;height:6px;border-radius:50%;background:${current?'var(--accent)':'var(--border)'}"></div>`}
          </div>
          <div style="margin-top:10px;text-align:center;padding:0 4px;">
            <div style="font-size:12px;font-weight:500;color:${done?'var(--green)':current?'var(--accent)':'var(--text-dim)'}">${s.label}</div>
            <div style="font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:3px">${s.ts ? fmtTime(s.ts) : '—'}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;

    const timelineHtml = (events || []).map((e, idx) => {
      const meta = typeof e.metadata === 'string' ? (() => { try { return JSON.parse(e.metadata); } catch { return null; } })() : e.metadata;
      return `
      <div class="timeline-item">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="timeline-dot" style="background:${e.event==='validation_failed'||e.event==='key_revoked'?'var(--red)':e.event==='app_validated'||e.event==='app_activated'||e.event==='email_verified'?'var(--green)':'var(--border)'}"></div>

        </div>
        <div style="flex:1;padding-bottom:4px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            ${eventBadge(e.event)}
            ${e.platform ? platformIcon(e.platform) : ''}
            <span style="font-size:11px;color:var(--text-dim);margin-left:auto">${fmtTime(e.created_at)}</span>
          </div>
          ${e.device_id ? `<div style="font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:4px">${e.device_id}</div>` : ''}
          ${meta ? `
            <div class="json-toggle" onclick="this.nextElementSibling.classList.toggle('open')">[+] metadata</div>
            <div class="json-body">${JSON.stringify(meta, null, 2)}</div>
          ` : ''}
        </div>
      </div>`;
    }).join('');

    const isRevoked = k.status === 'revoked';
    const rem = timeRemaining(k.expires_at, k.status);

      const m = typeof e.metadata === 'string' ? (() => { try { return JSON.parse(e.metadata); } catch { return null; } })() : e.metadata;

                </button>

              <div style="display:flex;gap:8px;flex-wrap:wrap">${statusBadge(k.status)} ${tierBadge(k.tier)}</div>

function copyKey(key) {
  navigator.clipboard.writeText(key).then(() => toast('Key copied to clipboard'));
}

function exportUserCSV(keyHash) {
  apiFetch('/admin/keys/' + keyHash).then(data => {
    const k = data.key;
    const events = data.events || [];
    const rows = [
      ['Field', 'Value'],
      ['Key', k.key], ['Status', k.status], ['Tier', k.tier],
      ['Email', k.email || ''],
      ['Name', [k.first_name, k.last_name].filter(Boolean).join(' ')],
      ['Company', k.company || ''], ['Role', k.role || ''], ['Tools', k.tools || ''],
      ['Requested', k.requested_at ? new Date(k.requested_at*1000).toISOString() : ''],
      ['Verified', k.verified_at ? new Date(k.verified_at*1000).toISOString() : ''],
      ['Activated', k.activated_at ? new Date(k.activated_at*1000).toISOString() : ''],
      ['Expires', k.expires_at ? new Date(k.expires_at*1000).toISOString() : ''],
      ['Windows Device', k.windows_device_id || ''],
      ['Mac Device', k.mac_device_id || ''],
      ['Admin Notes', k.admin_notes || ''],
      [], ['--- Events ---'],
      ['Event', 'Platform', 'Device', 'Time', 'Metadata'],
      ...events.map(e => [e.event, e.platform||'', e.device_id||'', new Date(e.created_at*1000).toISOString(), e.metadata||'']),
    ];
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `cuecadence-${k.key}.csv`;
    a.click(); URL.revokeObjectURL(url);
    toast('CSV exported');
  }).catch(err => toast(err.message, false));
}

  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'revoke-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;';
  modal.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;width:420px;max-width:90vw;box-shadow:0 24px 48px rgba(0,0,0,.5)">
      <div style="font-size:16px;font-family:'DM Serif Display',serif;margin-bottom:6px;">Revoke Key</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">This cannot be undone. The key will stop validating immediately.</div>
      <label style="font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:6px;">
        Reason <span style="color:var(--red)">*</span>
      </label>
      <textarea id="revoke-note" class="input" placeholder="e.g. User requested cancellation, suspected abuse…" style="width:100%;height:88px;resize:vertical;line-height:1.5;font-family:'Outfit',sans-serif;"></textarea>

async function submitRevoke(keyHash) {
  const note = document.getElementById('revoke-note').value.trim();
  if (!note) {
    document.getElementById('revoke-note').style.borderColor = 'var(--red)';
    document.getElementById('revoke-note').focus();
    return;
  }
  document.getElementById('revoke-modal').remove();
  try {
    await apiFetch('/admin/keys/' + keyHash + '/revoke', { method: 'POST', body: JSON.stringify({ note, changed_by: 'admin' }) });
    toast('Key revoked');
    renderDetail(keyHash);

    toast(err.message, false);

function extendTrial(keyHash, days) {
  apiFetch('/admin/keys/' + keyHash).then(data => {
    const k = data.key;
    actionModal({
      title: `Extend by ${days} days`,
      description: `New expiry will be ${fmtDate(Math.max(k.expires_at, Math.floor(Date.now()/1000)) + days * DAY)}.`,
      notePlaceholder: 'e.g. User requested extension…',
      confirmLabel: `+${days} days`,
      onConfirm: async (note) => {
        const base = Math.max(k.expires_at, Math.floor(Date.now()/1000));
        const expires_at = base + days * DAY;
        try {
          await apiFetch('/admin/keys/' + keyHash, { method: 'PATCH', body: JSON.stringify({ expires_at, tier: k.tier, changed_by: 'admin' }) });
          toast(`Extended by ${days} days`);
          renderDetail(keyHash);
        } catch (err) {
          toast(err.message, false);
        }
      },
    });
  });
}

  actionModal({
    title: 'Resend Verification Email',
    description: 'A new verification email will be sent to the address on file.',
    notePlaceholder: 'e.g. User reported email not received…',
    confirmLabel: 'Resend',
    onConfirm: async (note) => {
      try {
        await apiFetch('/admin/keys/' + keyHash + '/resend-verification', { method: 'POST', body: JSON.stringify({ note }) });
        toast('Verification email resent');
      } catch (err) {
        toast(err.message, false);
      }
    },
  });
}

function manualVerify(keyHash) {
  actionModal({
    title: 'Mark as Verified',
    description: 'Bypasses email confirmation and immediately activates the key.',
    notePlaceholder: 'e.g. Confirmed identity via call…',
    confirmLabel: 'Mark Verified',
    onConfirm: async (note) => {
      try {
        await apiFetch('/admin/keys/' + keyHash + '/verify', { method: 'POST', body: JSON.stringify({ note }) });
        toast('Key marked as verified');
        renderDetail(keyHash);
      } catch (err) {
        toast(err.message, false);
      }
    },
  });
}

function reactivateKey(keyHash) {
  actionModal({
    title: 'Re-activate Key',
    description: 'Expiry will be set to +30 days from today and the key will become active.',
    notePlaceholder: 'e.g. User had billing issue, re-activating after resolution…',
    confirmLabel: 'Re-activate',
    onConfirm: async (note) => {
      const expires_at = Math.floor(Date.now()/1000) + 30 * DAY;
      try {
        await apiFetch('/admin/keys/' + keyHash, { method: 'PATCH', body: JSON.stringify({ expires_at, changed_by: 'admin' }) });
        toast('Key re-activated (+30 days)');
        renderDetail(keyHash);
      } catch (err) {
        toast(err.message, false);
      }
    },
  });
}

function upgradeTier(keyHash, tier) {
  const label = tier.charAt(0).toUpperCase() + tier.slice(1);
  actionModal({
    title: `Upgrade to ${label}`,
    description: `This will immediately change the tier to ${label}.`,
    notePlaceholder: 'e.g. User upgraded via Stripe, applying manually…',
    confirmLabel: `Upgrade to ${label}`,
    onConfirm: async (note) => {
      try {
        await apiFetch('/admin/keys/' + keyHash, { method: 'PATCH', body: JSON.stringify({ tier, changed_by: 'admin' }) });
        toast(`Upgraded to ${label}`);
        renderDetail(keyHash);
      } catch (err) {
        toast(err.message, false);
      }
    },
  });
}

// ─────────────────────────────────────────
// STATS VIEW
// ─────────────────────────────────────────

function sectionLabel(text) {
  return `<div style="font-size:10px;font-weight:400;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:16px">${text}</div>`;
}

async function renderStats() {
  try {
    const data  = await apiFetch('/admin/stats');
    const total = data.total_keys;

    // ── Funnel ───────────────────────────────────────────────────────────────
    const funnelSteps = [
      { label: 'Requested', value: total,               pct: 100 },
      { label: 'Verified',  value: data.verified_keys,  pct: total ? Math.round(data.verified_keys/total*100)  : 0 },
      { label: 'Activated', value: data.activated_keys, pct: total ? Math.round(data.activated_keys/total*100) : 0 },
      { label: 'Paid',      value: data.paid_keys,      pct: total ? Math.round(data.paid_keys/total*100)      : 0 },
    ];
    const overallConvPct = total ? Math.round(data.paid_keys / total * 100) : 0;

    // ── Status / Tier breakdowns ─────────────────────────────────────────────
    const statusBreakdown = [
      { label: 'Active',   value: data.status_active,               badge: 'badge-green'  },
      { label: 'Pending',  value: data.status_pending_verification, badge: 'badge-yellow' },
      { label: 'Expired',  value: data.status_expired,              badge: 'badge-gray'   },
      { label: 'Revoked',  value: data.status_revoked,              badge: 'badge-red'    },
    ];
    const tierBreakdown = [
      { label: 'Trial',    value: data.tier_trial,    badge: 'badge-blue'   },
      { label: 'Basic',    value: data.tier_basic,    badge: 'badge-gray'   },
      { label: 'Standard', value: data.tier_standard, badge: 'badge-purple' },
      { label: 'Pro',      value: data.tier_pro,      badge: 'badge-yellow' },
    ];

    // ── Weekly signups chart ─────────────────────────────────────────────────
    const weekCounts = new Array(8).fill(0);
    (data.weekly_signups || []).forEach(w => {
      const idx = Math.min(7, Math.max(0, w.week_idx));
      weekCounts[idx] += w.count;
    });
    const base = data.weeks_ago_8_epoch || (Math.floor(Date.now()/1000) - 8*7*86400);
    const weekLabels = weekCounts.map((_, i) => {
      const d = new Date((base + i * 7 * 86400) * 1000);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    });
    const maxWeek = Math.max(...weekCounts, 1);
    const weeklyTotal = weekCounts.reduce((a, b) => a + b, 0);

    // ── Expiring soon ────────────────────────────────────────────────────────
    const expRows = [
      { label: 'Today',     value: data.expiring_today, color: data.expiring_today > 0 ? 'var(--red)'    : 'var(--text-dim)' },
      { label: 'In 3 days', value: data.expiring_3d,    color: data.expiring_3d    > 0 ? 'var(--yellow)' : 'var(--text-dim)' },
      { label: 'In 7 days', value: data.expiring_7d,    color: data.expiring_7d    > 0 ? 'var(--yellow)' : 'var(--text-dim)' },
    ];

    // ── Key metrics ──────────────────────────────────────────────────────────
    const avgDays = data.avg_trial_days != null ? data.avg_trial_days.toFixed(1) : '—';
    const minDays = data.min_trial_days != null ? Math.round(data.min_trial_days) : '—';
    const maxDays = data.max_trial_days != null ? Math.round(data.max_trial_days) : '—';
    const activationRate = total ? Math.round(data.activated_keys / total * 100) : 0;

    // ── Admin actions ────────────────────────────────────────────────────────
    const adminActions = [
      { label: 'Extensions',      value: data.admin_extensions     },
      { label: 'Tier Changes',    value: data.admin_tier_changes   },
      { label: 'Revocations',     value: data.admin_revocations    },
      { label: 'Device Resets',   value: data.admin_device_resets  },
      { label: 'Manual Verifies', value: data.admin_manual_verifies },
    ];

    document.getElementById('stats-content').innerHTML = `

      <!-- Conversion Funnel (full width) -->
      <div class="card" style="padding:20px 24px;grid-column:1/-1">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px">
          ${sectionLabel('Conversion Funnel')}
          <div style="text-align:right">
            <div style="font-size:36px;font-family:'DM Serif Display',serif;color:var(--green);line-height:1">${overallConvPct}%</div>
            <div style="font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:2px">Requested → Paid</div>
          </div>
        </div>
        <div style="display:grid;gap:14px">
          ${funnelSteps.map((s, i) => `
            <div>
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <div style="font-size:13px">${s.label}</div>
                <div style="display:flex;gap:12px;align-items:center">
                  <span style="font-size:22px;font-family:'DM Serif Display',serif;color:var(--accent)">${s.value}</span>
                  <span style="font-size:11px;color:var(--text-muted);width:36px;text-align:right;font-family:'DM Mono',monospace">${s.pct}%</span>
                </div>
              </div>
              <div style="background:var(--bg);border-radius:5px;overflow:hidden;height:8px">
                <div class="funnel-bar" style="width:${s.pct}%;background:var(--green)"></div>
              </div>
              ${i < funnelSteps.length-1 ? `<div style="font-size:10px;color:var(--text-dim);margin-top:4px;text-align:right;font-family:'DM Mono',monospace">→ ${funnelSteps[i+1].value > 0 && s.value > 0 ? Math.round(funnelSteps[i+1].value/s.value*100) : 0}% conversion to ${funnelSteps[i+1].label}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Status Breakdown -->
      <div class="card" style="padding:20px 24px">
        ${sectionLabel('Status Breakdown')}
        <div style="display:grid;gap:10px">
          ${statusBreakdown.map(s => `<div style="display:flex;align-items:center;justify-content:space-between"><span class="badge ${s.badge}">${s.label}</span><span style="font-size:22px;font-family:'DM Serif Display',serif">${s.value}</span></div>`).join('')}
        </div>
      </div>

      <!-- Tier Breakdown -->
      <div class="card" style="padding:20px 24px">
        ${sectionLabel('Tier Breakdown')}
        <div style="display:grid;gap:10px">
          ${tierBreakdown.map(t => `<div style="display:flex;align-items:center;justify-content:space-between"><span class="badge ${t.badge}">${t.label}</span><span style="font-size:22px;font-family:'DM Serif Display',serif">${t.value}</span></div>`).join('')}
        </div>
      </div>

      <!-- Weekly Signups Chart -->
      <div class="card" style="padding:20px 24px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
          ${sectionLabel('Weekly Signups')}
          <span style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace">${weeklyTotal} total</span>
        </div>
        <div style="display:flex;align-items:flex-end;gap:4px;height:72px;">
          ${weekCounts.map((count, i) => `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%">
              <div style="font-size:9px;color:var(--text-dim);font-family:'DM Mono',monospace;visibility:${count?'visible':'hidden'}">${count}</div>
              <div style="flex:1;width:100%;display:flex;align-items:flex-end">
                <div style="width:100%;background:var(--accent);border-radius:2px 2px 0 0;height:${count ? Math.max(3, Math.round(count/maxWeek*48)) : 0}px;opacity:.8"></div>
              </div>
            </div>
          `).join('')}
        </div>
        <div style="display:flex;gap:4px;margin-top:6px;padding-bottom:4px;overflow:hidden">
          ${weekLabels.map(l => `<div style="flex:1;font-size:8px;color:var(--text-dim);font-family:'DM Mono',monospace;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l}</div>`).join('')}
        </div>
      </div>

      <!-- Platform Breakdown -->
      <div class="card" style="padding:20px 24px">
        ${sectionLabel('Platform Breakdown')}
        <div style="display:grid;gap:10px">
          <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--text-muted)">⊞ Windows only</span><span style="font-size:22px;font-family:'DM Serif Display',serif">${data.platform_windows_only}</span></div>
          <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--text-muted)">⌘ Mac only</span><span style="font-size:22px;font-family:'DM Serif Display',serif">${data.platform_mac_only}</span></div>
          <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--text-muted)">⊞⌘ Both</span><span style="font-size:22px;font-family:'DM Serif Display',serif;color:var(--green)">${data.platform_both}</span></div>
          <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--text-dim)">Not activated</span><span style="font-size:22px;font-family:'DM Serif Display',serif;color:var(--text-dim)">${data.platform_not_activated}</span></div>
        </div>
      </div>

      <!-- Expiring Soon -->
      <div class="card" style="padding:20px 24px">
        ${sectionLabel('Expiring Soon')}
        <div style="display:grid;gap:10px">
          ${expRows.map(r => `<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--text-muted)">${r.label}</span><span style="font-size:22px;font-family:'DM Serif Display',serif;color:${r.color}">${r.value}</span></div>`).join('')}
        </div>
      </div>

      <!-- Key Metrics -->
      <div class="card" style="padding:20px 24px">
        ${sectionLabel('Key Metrics')}
        <div style="display:grid;gap:12px">
          <div>
            <div style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:3px">Activation Rate</div>
            <div style="font-size:28px;font-family:'DM Serif Display',serif;color:var(--accent)">${activationRate}%</div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:3px">Avg Trial Length</div>
            <div style="display:flex;align-items:baseline;gap:8px">
              <span style="font-size:28px;font-family:'DM Serif Display',serif;color:var(--accent)">${avgDays}</span>
              <span style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace">${minDays !== '—' ? `days (${minDays}–${maxDays})` : 'days'}</span>
            </div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:3px">Duplicate Requests</div>
            <div style="font-size:28px;font-family:'DM Serif Display',serif;color:${data.duplicate_requests > 0 ? 'var(--yellow)' : 'var(--text-dim)'}">${data.duplicate_requests}</div>
          </div>
        </div>
      </div>

      <!-- Admin Actions (full width) -->
      <div class="card" style="padding:20px 24px;grid-column:1/-1">
        ${sectionLabel('Admin Actions — All Time')}
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px">
          ${adminActions.map(a => `
            <div style="text-align:center">
              <div style="font-size:32px;font-family:'DM Serif Display',serif;color:var(--accent)">${a.value}</div>
              <div style="font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:4px;letter-spacing:.06em;text-transform:uppercase">${a.label}</div>
            </div>
          `).join('')}
        </div>
      </div>

    `;
  } catch (err) {
    document.getElementById('stats-content').innerHTML =
      `<div style="color:var(--red);font-size:13px;grid-column:1/-1">${err.message}</div>`;
  }
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
navigate('users');
</script>
</body>
</html>
